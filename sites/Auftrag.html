<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Auftragsverwaltung</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">
    <h2 class="section-title">Stammdaten des Auftrags</h2>

    <!-- Allgemeine Auftragsdaten -->
    <p class="form-group-label">Allgemeine Auftragsdaten</p>
    <div class="grid-4">
        <div class="field">
            <label>Auftragsnummer</label>
            <input type="text" id="auftragsnummer" placeholder="z. B. AUF-2026-0001" />
        </div>
        <div class="field">
            <label>Projektnummer</label>
            <input type="text" id="projektnummer" placeholder="z. B. PRJ-2026-042" />
        </div>
        <div class="field">
            <label>Kunde / Auftraggeber</label>
            <input type="text" id="kunde" placeholder="z. B. Lufthansa Technik AG" />
        </div>
        <div class="field">
            <label>Auftragstyp</label>
            <select id="auftragstyp">
                <option value=""></option>
                <option>Produktion</option>
                <option>Materialbestellung</option>
                <option>Transportauftrag</option>
                <option>Wartung</option>
                <option>Reparatur</option>
            </select>
        </div>
    </div>
    <div class="grid-4">
        <div class="field">
            <label>Priorität</label>
            <select id="prioritaet">
                <option value=""></option>
                <option>Niedrig</option>
                <option>Normal</option>
                <option>Hoch</option>
                <option>Kritisch</option>
            </select>
        </div>
        <div class="field">
            <label>Status</label>
            <select id="status">
                <option value=""></option>
                <option>Neu</option>
                <option>Offen</option>
                <option>In Bearbeitung</option>
                <option>Abgeschlossen</option>
                <option>Storniert</option>
            </select>
        </div>
        <div class="field">
            <label>Erstellungsdatum</label>
            <input type="date" id="erstellungsdatum" />
        </div>
        <div class="field">
            <label>Änderungsdatum</label>
            <input type="date" id="aenderungsdatum" />
        </div>
    </div>
    <div class="grid-4">
        <div class="field">
            <label>Verantwortlicher Mitarbeiter</label>
            <input type="text" id="mitarbeiter" placeholder="z. B. K. Burmester" />
        </div>
        <div class="field">
            <label>Kostenstelle</label>
            <input type="text" id="kostenstelle" placeholder="z. B. KST-4710" />
        </div>
        <div class="field">
            <label>Werk / Standort</label>
            <input type="text" id="werk" placeholder="z. B. Werk Hamburg-Nord" />
        </div>
        <div class="field">
            <label>Halle / Bahnhof / Fach</label>
            <input type="text" id="halle" placeholder="z. B. Halle 2 / Gleis 4 / F03" />
        </div>
    </div>

    <!-- Buttons -->
    <div class="form-actions">
        <button class="btn btn-primary">Speichern</button>
        <button class="btn">Zurücksetzen</button>
    </div>
</section>
</main>
</body>
</html>
