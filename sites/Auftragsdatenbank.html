<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auftragsdatenbank – Aero Dynamic Logistic</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
<main>
<style>
  .av-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
  .av-stat  { background:var(--bg-primary); border:0.5px solid var(--border-subtle); border-radius:var(--radius-lg); padding:14px 18px; display:flex; justify-content:space-between; align-items:center; }
  .av-stat-label { font-size:12px; color:var(--text-secondary); }
  .av-stat-value { font-size:24px; font-weight:700; }
  .data-table tbody tr { cursor:pointer; }
  .data-table tbody td.td-actions { cursor:default; white-space:nowrap; text-align:right; }
  .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:300; align-items:center; justify-content:center; padding:16px; }
  .confirm-overlay.open { display:flex; }
  .confirm-box { background:var(--bg-primary); border:0.5px solid var(--border-subtle); border-radius:var(--radius-xl); padding:28px 28px 22px; max-width:440px; width:100%; box-shadow:0 16px 48px rgba(0,0,0,.2); }
  .confirm-title { font-size:16px; font-weight:700; color:var(--text-primary); margin-bottom:10px; }
  .confirm-msg   { font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:22px; }
  .confirm-actions { display:flex; justify-content:flex-end; gap:8px; }
  .td-empty  { text-align:center; padding:40px !important; color:var(--text-tertiary); font-size:13px; }
  .av-title    { font-size:20px; font-weight:700; color:var(--text-primary); }
  .av-subtitle { font-size:13px; color:var(--text-secondary); margin-top:2px; }
</style>
<div class="container" style="max-width:1400px;">

  <!-- Seitenkopf -->
  <div class="page-header">
    <div>
      <div class="av-title">Auftragsdatenbank</div>
      <div class="av-subtitle" id="av-subtitle">Aufträge werden geladen…</div>
    </div>
    <button class="btn btn-primary" id="btn-neuer-auftrag">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Neuen Auftrag anlegen
    </button>
  </div>

  <!-- Quick-Stats -->
  <div class="av-stats" id="av-stats"></div>

  <!-- Filterleiste -->
  <div class="filter-bar">
    <div class="search-field" style="flex:1;min-width:240px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="av-search" placeholder="Suche nach Nr., Kunde, Projekt, Verantwortlichem…" />
    </div>
    <div class="field" style="margin:0;">
      <select id="av-filter-status" style="min-width:160px;">
        <option value="">Alle Status</option>
        <option>Neu</option>
        <option>Offen</option>
        <option>In Bearbeitung</option>
        <option>Abgeschlossen</option>
        <option>Storniert</option>
      </select>
    </div>
    <div class="field" style="margin:0;">
      <select id="av-filter-typ" style="min-width:175px;">
        <option value="">Alle Auftragstypen</option>
        <option>Produktion</option>
        <option>Materialbestellung</option>
        <option>Transportauftrag</option>
        <option>Wartung</option>
        <option>Reparatur</option>
      </select>
    </div>
    <div class="field" style="margin:0;">
      <select id="av-filter-prio" style="min-width:155px;">
        <option value="">Alle Prioritäten</option>
        <option>Niedrig</option>
        <option>Normal</option>
        <option>Hoch</option>
        <option>Kritisch</option>
      </select>
    </div>
  </div>

  <!-- Datentabelle -->
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Auftrags-Nr.</th>
          <th>Projektnr.</th>
          <th>Kunde / Auftraggeber</th>
          <th>Typ</th>
          <th>Verantwortlich</th>
          <th>Datum</th>
          <th>Fällig</th>
          <th>Priorität</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="av-tbody"></tbody>
    </table>
  </div>

</div>

<!-- Modal: Neuer Auftrag / Auftrag bearbeiten -->
<div class="modal-overlay" id="modal-auftrag" role="dialog" aria-modal="true"
     aria-labelledby="modal-auftrag-title">
  <div class="modal" style="max-width:860px;">
    <div class="modal-header">
      <h3 id="modal-auftrag-title">Neuen Auftrag anlegen</h3>
      <button class="modal-close" id="modal-auftrag-close" aria-label="Schließen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">

      <p class="form-group-label">Allgemeine Auftragsdaten</p>
      <div class="grid-4">
        <div class="field">
          <label>Auftragsnummer</label>
          <input type="text" id="auf-nr" placeholder="wird automatisch vergeben" />
        </div>
        <div class="field">
          <label>Projektnummer</label>
          <input type="text" id="auf-projektnr" placeholder="z. B. PRJ-2026-042" />
        </div>
        <div class="field">
          <label>Kunde / Auftraggeber</label>
          <select id="auf-kunde">
            <option value="">— bitte wählen —</option>
            <optgroup label="Airlines – Deutschland">
              <option>Deutsche Lufthansa AG</option>
              <option>Eurowings GmbH</option>
              <option>Condor Flugdienst GmbH</option>
              <option>TUIfly GmbH</option>
            </optgroup>
            <optgroup label="Airlines – Europa">
              <option>Air France S.A.</option>
              <option>British Airways PLC</option>
              <option>KLM Royal Dutch Airlines</option>
              <option>Ryanair DAC</option>
              <option>easyJet plc</option>
              <option>Swiss International Air Lines AG</option>
              <option>Turkish Airlines A.Ş.</option>
              <option>Iberia L.A.E.</option>
              <option>Finnair PLC</option>
              <option>Austrian Airlines AG</option>
              <option>Brussels Airlines SA</option>
            </optgroup>
            <optgroup label="Airlines – International">
              <option>Emirates</option>
              <option>Qatar Airways</option>
              <option>Singapore Airlines</option>
              <option>Delta Air Lines Inc.</option>
              <option>United Airlines Inc.</option>
              <option>American Airlines Inc.</option>
              <option>Air Canada</option>
              <option>Cathay Pacific Airways</option>
              <option>Japan Airlines Co. Ltd.</option>
              <option>All Nippon Airways Co. Ltd.</option>
            </optgroup>
            <optgroup label="MRO &amp; Technik">
              <option>Lufthansa Technik AG</option>
              <option>Air France Industries KLM E&amp;M</option>
              <option>SR Technics Switzerland AG</option>
              <option>Sabena Technics S.A.</option>
              <option>HAECO Hong Kong</option>
            </optgroup>
            <optgroup label="Hersteller &amp; Zulieferer">
              <option>Airbus SE</option>
              <option>The Boeing Company</option>
              <option>MTU Aero Engines AG</option>
              <option>Rolls-Royce Deutschland Ltd &amp; Co. KG</option>
              <option>Safran S.A.</option>
              <option>Collins Aerospace</option>
              <option>Honeywell Aerospace</option>
              <option>GE Aviation</option>
              <option>Pratt &amp; Whitney</option>
              <option>Liebherr Aerospace</option>
              <option>Diehl Aviation GmbH</option>
            </optgroup>
            <optgroup label="Flughäfen &amp; Ground Services">
              <option>Fraport AG</option>
              <option>Flughafen München GmbH</option>
              <option>Flughafen Hamburg GmbH</option>
              <option>Flughafen Stuttgart GmbH</option>
              <option>Flughafen Düsseldorf GmbH</option>
              <option>Berlin Brandenburg Airport GmbH</option>
              <option>Swissport International AG</option>
            </optgroup>
            <optgroup label="Verteidigung &amp; Raumfahrt">
              <option>Airbus Defence and Space GmbH</option>
              <option>Leonardo S.p.A.</option>
              <option>BAE Systems PLC</option>
            </optgroup>
          </select>
        </div>
        <div class="field">
          <label>Auftragstyp</label>
          <select id="auf-typ">
            <option value=""></option>
            <option>Produktion</option>
            <option>Materialbestellung</option>
            <option>Transportauftrag</option>
            <option>Wartung</option>
            <option>Reparatur</option>
          </select>
        </div>
      </div>
      <div class="grid-4">
        <div class="field">
          <label>Priorität</label>
          <select id="auf-prio">
            <option value=""></option>
            <option>Niedrig</option>
            <option>Normal</option>
            <option>Hoch</option>
            <option>Kritisch</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="auf-status">
            <option value=""></option>
            <option>Neu</option>
            <option>Offen</option>
            <option>In Bearbeitung</option>
            <option>Abgeschlossen</option>
            <option>Storniert</option>
          </select>
        </div>
        <div class="field">
          <label>Erstellungsdatum</label>
          <input type="date" id="auf-datum" />
        </div>
        <div class="field">
          <label>Fällig am</label>
          <input type="date" id="auf-faellig" />
        </div>
      </div>

      <p class="form-group-label">Organisation</p>
      <div class="grid-4">
        <div class="field">
          <label>Verantwortlicher Mitarbeiter</label>
          <input type="text" id="auf-verantwortlich" placeholder="z. B. K. Burmester" />
        </div>
        <div class="field">
          <label>Kostenstelle</label>
          <input type="text" id="auf-kostenstelle" placeholder="z. B. KST-4710" />
        </div>
        <div class="field">
          <label>Werk / Standort</label>
          <select id="auf-werk">
            <option value="">— bitte wählen —</option>
          </select>
        </div>
        <div class="field">
          <label>Halle / Bereich</label>
          <select id="auf-halle">
            <option value="">— bitte wählen —</option>
          </select>
        </div>
      </div>

      <p class="form-group-label">Beschreibung</p>
      <div class="field">
        <label>Bemerkung / Beschreibung</label>
        <textarea id="auf-bemerkung" rows="3"
          placeholder="Optionale Beschreibung oder Hinweise zum Auftrag…"></textarea>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="modal-auftrag-save">Speichern</button>
      <button class="btn" id="modal-auftrag-cancel">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Bestätigungsdialog: Löschen -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">Auftrag löschen</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn" id="confirm-cancel">Abbrechen</button>
      <button class="btn btn-danger" id="confirm-ok">Endgültig löschen</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const store  = ADLStore.auftraege;
  let editId   = null;
  let deleteId = null;
  let allData  = [];

  const BADGE = {
    'Aktiv':'success','Abgeschlossen':'success',
    'In Bearbeitung':'warning','Hoch':'warning',
    'Offen':'info','Normal':'info','Neu':'info',
    'Niedrig':'secondary',
    'Storniert':'danger','Kritisch':'danger',
  };
  function badge(s) {
    if (!s) return '–';
    return `<span class="badge badge-${BADGE[s]||'info'}"><span class="dot"></span>${esc(s)}</span>`;
  }
  function esc(s) {
    return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(iso) {
    if (!iso) return '–';
    const d = new Date(iso);
    return isNaN(d) ? iso : d.toLocaleDateString('de-DE');
  }

  function renderStats(data) {
    let offen = 0, aktiv = 0, kritisch = 0;
    data.forEach(r => {
      if (r.status === 'Offen' || r.status === 'Neu') offen++;
      if (r.status === 'In Bearbeitung') aktiv++;
      if (r.prioritaet === 'Kritisch') kritisch++;
    });
    document.getElementById('av-stats').innerHTML = [
      ['Gesamt',         data.length, 'var(--text-primary)'],
      ['Offen / Neu',    offen,       'var(--info-solid)'],
      ['In Bearbeitung', aktiv,       'var(--warning-solid)'],
      ['Kritisch',       kritisch,    'var(--danger-solid)'],
    ].map(([label, val, color]) => `
      <div class="av-stat">
        <span class="av-stat-label">${label}</span>
        <span class="av-stat-value" style="color:${color}">${val}</span>
      </div>`).join('');
  }

  const EDIT_SVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  const DEL_SVG  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

  function renderTable(data) {
    const tbody = document.getElementById('av-tbody');
    const total = allData.length;
    document.getElementById('av-subtitle').textContent =
      data.length === total
        ? `${total} Auftrag${total !== 1 ? 'e' : ''} im System`
        : `${data.length} von ${total} Aufträgen`;

    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="10" class="td-empty">Keine Aufträge gefunden.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr data-id="${esc(r.id)}">
        <td style="font-weight:600;white-space:nowrap;">${esc(r.nr||'–')}</td>
        <td class="td-mono">${esc(r.projektnr||'–')}</td>
        <td>${esc(r.kunde||'–')}</td>
        <td style="color:var(--text-secondary);">${esc(r.typ||'–')}</td>
        <td style="color:var(--text-secondary);">${esc(r.verantwortlicher||'–')}</td>
        <td style="color:var(--text-secondary);white-space:nowrap;">${fmtDate(r.datum)}</td>
        <td style="color:var(--text-secondary);white-space:nowrap;">${fmtDate(r.faellig)}</td>
        <td>${badge(r.prioritaet)}</td>
        <td>${badge(r.status)}</td>
        <td class="td-actions">
          <button class="btn btn-sm" title="Bearbeiten"
                  data-action="edit" data-id="${esc(r.id)}">${EDIT_SVG}</button>
          <button class="btn btn-sm" title="Löschen" style="color:var(--danger-text);"
                  data-action="delete" data-id="${esc(r.id)}"
                  data-label="${esc(r.nr||r.id)}">${DEL_SVG}</button>
        </td>
      </tr>`).join('');
  }

  function reload() {
    allData = store.getAll();
    renderStats(allData);
    applyFilter();
  }

  function applyFilter() {
    const q  = document.getElementById('av-search').value.trim().toLowerCase();
    const st = document.getElementById('av-filter-status').value;
    const ty = document.getElementById('av-filter-typ').value;
    const pr = document.getElementById('av-filter-prio').value;
    const filtered = allData.filter(r => {
      if (st && r.status     !== st) return false;
      if (ty && r.typ        !== ty) return false;
      if (pr && r.prioritaet !== pr) return false;
      if (q) {
        const hay = [r.nr, r.projektnr, r.kunde, r.verantwortlicher, r.kostenstelle]
          .join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    renderTable(filtered);
  }

  const modal      = document.getElementById('modal-auftrag');
  const modalTitle = document.getElementById('modal-auftrag-title');

  function getVal(id) { return (document.getElementById(id)?.value??'').trim(); }
  function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v??''; }

  function fillWerkSelect(selectedVal) {
    const el = document.getElementById('auf-werk');
    if (!el) return;
    const lager = ADLStore.lager.getAll();
    el.innerHTML = '<option value="">— bitte wählen —</option>' +
      lager.map(l => `<option value="${l.bezeichnung}">${l.nr} – ${l.bezeichnung}</option>`).join('');
    if (selectedVal) el.value = selectedVal;
  }

  function fillHalleSelect(filterBezeichnung, selectedVal) {
    const el = document.getElementById('auf-halle');
    if (!el) return;
    const hallen = ADLStore.hallen.getAll();
    const filtered = filterBezeichnung
      ? (() => {
          const lager = ADLStore.lager.getAll().find(l => l.bezeichnung === filterBezeichnung);
          return lager ? hallen.filter(h => h.lagerNr === lager.nr) : hallen;
        })()
      : hallen;
    el.innerHTML = '<option value="">— bitte wählen —</option>' +
      filtered.map(h => `<option value="${h.bezeichnung}">${h.nr} – ${h.bezeichnung}</option>`).join('');
    if (selectedVal) el.value = selectedVal;
  }

  function openModal(title, record) {
    modalTitle.textContent = title;
    setVal('auf-nr',           record?.nr           || store.nextNr('AUF', 'nr'));
    setVal('auf-projektnr',    record?.projektnr    || '');
    setVal('auf-kunde',        record?.kunde        || '');
    setVal('auf-typ',          record?.typ          || '');
    setVal('auf-prio',         record?.prioritaet   || '');
    setVal('auf-status',       record?.status       || 'Offen');
    setVal('auf-datum',        record?.datum        || new Date().toISOString().slice(0,10));
    setVal('auf-faellig',      record?.faellig      || '');
    setVal('auf-verantwortlich', record?.verantwortlicher || '');
    setVal('auf-kostenstelle', record?.kostenstelle || '');
    fillWerkSelect(record?.werk  || '');
    fillHalleSelect(record?.werk || '', record?.halle || '');
    setVal('auf-bemerkung',    record?.bemerkung    || '');
    modal.classList.add('open');
    document.getElementById('auf-projektnr').focus();
  }

  function closeModal() { modal.classList.remove('open'); editId = null; }

  function saveModal() {
    const nr = getVal('auf-nr');
    if (!nr) { document.getElementById('auf-nr').focus(); return; }
    const data = {
      nr,
      projektnr:        getVal('auf-projektnr'),
      kunde:            getVal('auf-kunde'),
      typ:              getVal('auf-typ'),
      prioritaet:       getVal('auf-prio'),
      status:           getVal('auf-status'),
      datum:            getVal('auf-datum'),
      faellig:          getVal('auf-faellig'),
      verantwortlicher: getVal('auf-verantwortlich'),
      kostenstelle:     getVal('auf-kostenstelle'),
      werk:             getVal('auf-werk'),
      halle:            getVal('auf-halle'),
      bemerkung:        getVal('auf-bemerkung'),
    };
    if (editId) { store.update(editId, data); }
    else        { store.add(data); }
    closeModal();
    reload();
  }

  const confirmOverlay = document.getElementById('confirm-overlay');

  function openConfirm(id, label) {
    deleteId = id;
    document.getElementById('confirm-msg').textContent =
      `Soll Auftrag „${label}" wirklich endgültig gelöscht werden? Diese Aktion kann nicht rückgängig gemacht werden.`;
    confirmOverlay.classList.add('open');
  }
  function closeConfirm() { confirmOverlay.classList.remove('open'); deleteId = null; }

  document.getElementById('auf-werk')?.addEventListener('change', function () {
    fillHalleSelect(this.value, '');
  });

  document.getElementById('btn-neuer-auftrag').addEventListener('click', () => {
    editId = null; openModal('Neuen Auftrag anlegen', null);
  });
  document.getElementById('modal-auftrag-close').addEventListener('click', closeModal);
  document.getElementById('modal-auftrag-cancel').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.getElementById('modal-auftrag-save').addEventListener('click', saveModal);

  document.getElementById('av-search').addEventListener('input', applyFilter);
  document.getElementById('av-filter-status').addEventListener('change', applyFilter);
  document.getElementById('av-filter-typ').addEventListener('change', applyFilter);
  document.getElementById('av-filter-prio').addEventListener('change', applyFilter);

  document.getElementById('av-tbody').addEventListener('click', e => {
    const row = e.target.closest('tr[data-id]');
    if (!row) return;
    const btn = e.target.closest('[data-action]');
    if (btn) {
      const id = btn.dataset.id;
      if (btn.dataset.action === 'edit') {
        editId = id; openModal('Auftrag bearbeiten', store.getById(id));
      } else if (btn.dataset.action === 'delete') {
        openConfirm(id, btn.dataset.label);
      }
      return;
    }
    editId = row.dataset.id;
    openModal('Auftrag bearbeiten', store.getById(editId));
  });

  document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);
  confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) closeConfirm(); });
  document.getElementById('confirm-ok').addEventListener('click', () => {
    if (deleteId) { store.remove(deleteId); closeConfirm(); reload(); }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeConfirm(); }
  });
  modal.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); saveModal(); }
  });

  reload();
})();
</script>

</main>
</body>
</html>
