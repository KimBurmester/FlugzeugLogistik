<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Neue Bestellung</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Neue Bestellung</h2>
        <button class="btn btn-sm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Vorlage laden
        </button>
    </div>

    <!-- Bestellkopf -->
    <p class="form-group-label">Bestellkopf</p>
    <div class="grid-4">
        <div class="field">
            <label>Bestellnummer</label>
            <input type="text" id="bestellnummer" placeholder="z. B. BST-2026-0009" />
        </div>
        <div class="field">
            <label>Lieferant</label>
            <select id="lieferant">
                <option value=""></option>
                <option>Bosch Rexroth AG</option>
                <option>Parker Hannifin GmbH</option>
                <option>Hydac International GmbH</option>
                <option>Festo SE &amp; Co. KG</option>
                <option>Siemens AG</option>
                <option>WAGO Kontakttechnik GmbH &amp; Co. KG</option>
                <option>Würth Industrie Service GmbH &amp; Co. KG</option>
                <option>ifm electronic gmbh</option>
                <option>Balluff GmbH</option>
                <option>SICK AG</option>
            </select>
        </div>
        <div class="field">
            <label>Bestelldatum</label>
            <input type="date" id="bestelldatum" />
        </div>
        <div class="field">
            <label>Gewünschtes Lieferdatum</label>
            <input type="date" id="lieferdatum" />
        </div>
    </div>
    <div class="grid-4">
        <div class="field">
            <label>Priorität</label>
            <select id="prioritaet">
                <option value=""></option>
                <option>Niedrig</option>
                <option>Normal</option>
                <option>Hoch</option>
                <option>Dringend</option>
            </select>
        </div>
        <div class="field">
            <label>Status</label>
            <select id="status">
                <option value=""></option>
                <option>Entwurf</option>
                <option>Offen</option>
                <option>In Lieferung</option>
                <option>Abgeschlossen</option>
                <option>Storniert</option>
            </select>
        </div>
        <div class="field">
            <label>Kostenstelle</label>
            <input type="text" id="kostenstelle" placeholder="z. B. KST-4710" />
        </div>
        <div class="field">
            <label>Ansprechpartner</label>
            <input type="text" id="ansprechpartner" placeholder="z. B. K. Burmester" />
        </div>
    </div>

    <!-- Lieferbedingungen -->
    <p class="form-group-label">Lieferbedingungen</p>
    <div class="grid-4">
        <div class="field">
            <label>Lieferart</label>
            <select id="lieferart">
                <option value=""></option>
                <option>Standardlieferung</option>
                <option>Expresslieferung</option>
                <option>Spedition</option>
                <option>Selbstabholung</option>
            </select>
        </div>
        <div class="field">
            <label>Versandart</label>
            <select id="versandart">
                <option value=""></option>
                <option>LKW / Spedition</option>
                <option>Paketdienst</option>
                <option>Bahn (Cargo)</option>
                <option>Luftfracht</option>
                <option>Seefracht</option>
            </select>
        </div>
        <div class="field">
            <label>Zahlungsbedingung</label>
            <select id="zahlungsbedingung">
                <option value=""></option>
                <option>14 Tage, 2 % Skonto</option>
                <option>30 Tage netto</option>
                <option>60 Tage netto</option>
                <option>Sofort netto</option>
                <option>Vorkasse</option>
            </select>
        </div>
        <div class="field">
            <label>Lieferadresse</label>
            <input type="text" id="lieferadresse" placeholder="z. B. Werk Hamburg-Nord, Halle 1" />
        </div>
    </div>

    <!-- Positionen -->
    <div class="page-header">
        <p class="form-group-label">Positionen</p>
        <button class="btn btn-sm" data-action="bestellung-position">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Position hinzufügen
        </button>
    </div>

    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Pos.</th>
                    <th>Artikelnummer</th>
                    <th>Bezeichnung</th>
                    <th>Menge</th>
                    <th>Einheit</th>
                    <th>Einzelpreis (€)</th>
                    <th>Gesamtpreis (€)</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="td-mono">010</td>
                    <td class="td-mono">239324875</td>
                    <td>Hydraulikschlauch DN16</td>
                    <td>10</td>
                    <td>Stück</td>
                    <td class="td-mono">45,00</td>
                    <td class="td-mono">450,00</td>
                    <td><button class="btn btn-sm btn-ghost"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></td>
                </tr>
                <tr>
                    <td class="td-mono">020</td>
                    <td class="td-mono">847362918</td>
                    <td>O-Ring 50×3 NBR</td>
                    <td>200</td>
                    <td>Stück</td>
                    <td class="td-mono">0,85</td>
                    <td class="td-mono">170,00</td>
                    <td><button class="btn btn-sm btn-ghost"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></td>
                </tr>
                <tr>
                    <td class="td-mono">030</td>
                    <td class="td-mono">102938475</td>
                    <td>Kugelventil ½"</td>
                    <td>5</td>
                    <td>Stück</td>
                    <td class="td-mono">124,00</td>
                    <td class="td-mono">620,00</td>
                    <td><button class="btn btn-sm btn-ghost"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Buttons -->
    <div class="form-actions">
        <button class="btn btn-primary">Speichern</button>
        <button class="btn">Zurücksetzen</button>
    </div>

</section>
</main>
</body>
</html>
