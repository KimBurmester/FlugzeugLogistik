<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Artikelbewegung</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Artikelbewegung</h2>
        <button class="btn btn-sm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid-4 kpi-row">
        <div class="metric-card">
            <div class="metric-label">Bewegungen heute</div>
            <div class="metric-value" id="kpi-bwg-heute">—</div>
            <div class="metric-trend" id="kpi-bwg-trend"></div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Wareneingänge</div>
            <div class="metric-value metric-value-success" id="kpi-bwg-wareneingang">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Auslagerungen</div>
            <div class="metric-value metric-value-info" id="kpi-bwg-auslagerung">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Versandfertig</div>
            <div class="metric-value metric-value-warning" id="kpi-bwg-versand">—</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Bewegungsnr., Artikelnr. oder Seriennr. suchen…" />
        </div>
        <div class="field min-w-170">
            <select>
                <option value="">Alle Bewegungstypen</option>
                <option>Wareneingang</option>
                <option>Einlagerung</option>
                <option>Umlagerung</option>
                <option>Auslagerung</option>
                <option>Versand</option>
            </select>
        </div>
        <div class="field min-w-150">
            <input type="text" placeholder="Datum (TT.MM.JJJJ)" />
        </div>
        <div class="field min-w-150">
            <select>
                <option value="">Alle Benutzer</option>
                <option>K. Burmester</option>
                <option>M. Schulz</option>
                <option>J. Weber</option>
            </select>
        </div>
    </div>

    <!-- Tabelle -->
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Bewegungsnr.</th>
                    <th>Zeitstempel</th>
                    <th>Artikelnr.</th>
                    <th>Bezeichnung</th>
                    <th>Seriennr. / Charge</th>
                    <th>Bewegungstyp</th>
                    <th>Von</th>
                    <th>Nach / Ziel</th>
                    <th>Transporteinheit</th>
                    <th>Scanner / Benutzer</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Legende -->
    <div class="legend-row">
        <span class="legend-label">Legende:</span>
        <span class="badge badge-success"><span class="dot"></span>Wareneingang</span>
        <span class="badge badge-info"><span class="dot"></span>Einlagerung</span>
        <span class="badge badge-purple"><span class="dot"></span>Umlagerung</span>
        <span class="badge badge-warning"><span class="dot"></span>Auslagerung</span>
        <span class="badge badge-danger"><span class="dot"></span>Versand</span>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
        <span class="pagination-info"></span>
        <div class="pagination-buttons"></div>
    </div>

</section>
</main>
</body>
</html>
