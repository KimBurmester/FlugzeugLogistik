<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirLog – Instandhaltung</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
    <section class="container">
        <h2 class="section-title">Instandhaltung</h2>
        <div class="grid-3">
            <div class="field">
                <label>Artikelbezeichnung</label>
                <input type="text" id="artikelbezeichnung" placeholder="z. B. Hydraulikschlauch" />
            </div>
            <div class="field">
                <label>Artikelnummer</label>
                <input type="text" id="artikelnummer" placeholder="z. B. 239324875" />
            </div>
            <div class="field">
                <label>SN-Nummer</label>
                <input type="text" id="seriennummer" placeholder="z. B. 239324875" />
            </div>
            <div class="field">
                <label>Maschinennummer</label>
                <input type="text" id="maschinennummer" placeholder="z. B. 239324875" />
            </div>
            <div class="field">
                <label>Warengruppe</label>
                <select>
                    <option>Hydraulik</option>
                    <option>Elektronik</option>
                    <option>Mechanik</option>
                    <option>Verbrauchsmaterial</option>
                </select>
            </div>
            <div class="field">
                <label>Einheit</label>
                <select>
                    <option>Stück</option>
                    <option>Liter</option>
                    <option>Meter</option>
                    <option>Kilogramm</option>
                </select>
            </div>
            <div class="field">
                <label>Mindestbestand</label>
                <input type="text" id="Mindestbestand" placeholder="0" />
            </div>
            <div class="field">
                <label>Lagerort</label>
                <input type="text" id="Lagerort" placeholder="z. B. Halle A / Regal 3" />
            </div>
        </div>
        <div class="grid-3">
            <div class="field">
                <label>Beschreibung</label>
                <textarea rows="3" id="beschreibung" placeholder="Optionale Beschreibung..."></textarea>
            </div>
        </div>
        <div style="display:flex; gap: 8px; margin-top: 8px;">
            <button class="btn btn-primary">Speichern</button>
            <button class="btn">Zurücksetzen</button>
        </div>
    </section>
</main>
</body>
<script src="script.js"></script>
</html>
